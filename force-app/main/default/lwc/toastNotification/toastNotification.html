<template>
    <lightning-card title="create account with a Name">
        <div class="slds-m-around_medium">
            <lightning-input
                value={accountName}
                label="Name"
                placeholder="Enter your Name..."
                onchange={handleName}
            ></lightning-input>

            <lightning-button
                label="create Account"
                variant="brand"
                onclick={handleAccountCreation}
            ></lightning-button>
        </div>
    </lightning-card>
</template>
