<template>
    <lightning-card title="Zodiac Finder">
        <div class="slds-p-around_medium">
            <!-- Name -->
            <lightning-input
                type="text"
                label="Enter Your Name"
                value={userName}
                onchange={handleNameChange}
            >
            </lightning-input>

            <!-- DOB -->
            <lightning-input
                type="date"
                label="Date of Birth"
                value={dob}
                onchange={handleDobChange}
            >
            </lightning-input>

            <!-- Submit -->
            <lightning-button
                label="Find Zodiac"
                variant="brand"
                class="slds-m-top_medium"
                onclick={handleSubmit}
            >
            </lightning-button>
        </div>

        <!-- Result -->
        <template if:true={selectedZodiac}>
            <div class="result-box slds-p-around_medium">
                <h1>{selectedZodiac.emoji}</h1>

                <p class="name-text">
                    Hello {userName} your Zodiac sign is {selectedZodiac.sign}
                </p>

                <p>Your Zodiac trait is {selectedZodiac.trait}</p>
            </div>
        </template>
    </lightning-card>
</template>
