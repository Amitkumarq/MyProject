<template>
    <lightning-card>
        <template lwc:if={hasProducts}>
            <template for:each={productList} for:item="product">
                <div key={product.id}>
                    <c-child-component
                        product-name={product.name}
                        product-price={product.price}
                    ></c-child-component>
                </div>
            </template>
        </template>
    </lightning-card>

    <template lwc:if={parentCalled}>
        <lightning-card>Parent Called the c-child-component!</lightning-card>
    </template>
</template>
